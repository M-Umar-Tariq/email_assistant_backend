name: Deploy Backend to VPS

on:
  push:
    branches:
      - main  # Deploy when there's a push to 'main' branch in the backend repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v2

      - name: SSH to VPS and deploy backend
        uses: appleboy/ssh-action@v0.1.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the backend directory
            cd C:/Users/Administrator/Desktop/apps/email-assistant/backend/email_assistant

            # Pull the latest changes
            git pull origin main

            # Activate the virtual environment
            .\.venv\Scripts\Activate.ps1

            # Install dependencies
            pip install -r requirements.txt

            # Restart the Django server
            Get-Process python -ErrorAction SilentlyContinue | Stop-Process -Force
            Start-Process python -ArgumentList "manage.py runserver 0.0.0.0:8000"
