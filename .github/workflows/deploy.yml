name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Deploy backend on VPS
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          git config --global --add safe.directory C:/apps/email-assistant/backend/email_assistant_backend

          Set-Location C:\apps\email-assistant\backend\email_assistant_backend\email_assistant

          # Stop app safely (ignore errors)
          npx pm2 stop email-assistant-backend 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "PM2 stop skipped..." }

          # Clean cache
          Get-ChildItem -Recurse -Include *.pyc | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Directory -Filter "__pycache__" | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          # Pull latest code
          git fetch origin
          git reset --hard origin/main

          $python = ".\.venv\Scripts\python.exe"

          # Install dependencies
          & $python -m pip install --upgrade pip
          & $python -m pip install -r requirements.txt
          & $python -m pip install waitress

          # Django
          & $python manage.py migrate
          & $python manage.py collectstatic --noinput

          # Restart app
          npx pm2 restart email-assistant-backend
          npx pm2 save