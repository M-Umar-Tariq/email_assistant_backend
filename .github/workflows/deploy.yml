name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy backend on VPS
        shell: powershell
        run: |
          Set-Location C:\Users\Administrator\Desktop\apps\email-assistant\backend\email_assistant
          git fetch origin
          git reset --hard origin/main
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install waitress
          .\.venv\Scripts\python.exe manage.py migrate
          .\.venv\Scripts\python.exe manage.py collectstatic --noinput
          pm2 restart email-assistant-backend
          pm2 save
